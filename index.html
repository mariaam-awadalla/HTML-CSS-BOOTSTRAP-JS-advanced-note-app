<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Note App</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

  <div class="container py-4">

    <h1 class="text-center mb-2">Note App</h1>

  
    <div class="d-flex gap-2 justify-content-center mb-4">
      <input type="text" id="search" class="form-control w-50" placeholder="Search..." />
      <button id="themeToggle" class="btn btn-dark">🌙</button>
      <button onclick="exportNotes()" class="btn btn-success">Export</button>
    </div>

    <!-- Notes -->
    <div class="app" id="app">
      <button class="btn btn-primary add-btn" id="btn">+</button>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
